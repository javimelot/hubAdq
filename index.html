<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB de Adquirencia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 60% 40%, rgba(249, 115, 22, 0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(249, 115, 22, 0.06) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse {
            0%   { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(3deg); }
        }

        .container {
            position: relative;
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }

        /* Logo */
        .logo {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .logo svg {
            filter: drop-shadow(0 0 24px rgba(249, 115, 22, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(249, 115, 22, 0.15);
            border: 1px solid rgba(249, 115, 22, 0.35);
            color: #f97316;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            background: #f97316;
            border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* Heading */
        h1 {
            font-size: clamp(32px, 6vw, 52px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 40%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 16px;
            color: #9ca3af;
            line-height: 1.7;
            margin-bottom: 48px;
        }

        /* Progress bar */
        .progress-wrap {
            margin-bottom: 48px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            border-radius: 999px;
            position: relative;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%   { filter: brightness(1); }
            50%  { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }

        /* Features */
        .features {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            color: #d1d5db;
        }

        .feature svg {
            color: #f97316;
            flex-shrink: 0;
        }

        /* Footer */
        footer {
            font-size: 12px;
            color: #4b5563;
        }

        footer a {
            color: #f97316;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="24" fill="#111111"/>
                <!-- Flame -->
                <defs>
                    <linearGradient id="fg" x1="28" y1="75" x2="48" y2="18" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#f97316"/>
                        <stop offset="100%" stop-color="#fbbf24"/>
                    </linearGradient>
                </defs>
                <path d="M46 75 C46 75 26 65 26 48 C26 33 38 25 38 25 C38 25 34 38 43 43 C43 43 38 30 50 22 C50 22 46 38 55 43 C55 43 60 33 58 22 C58 22 70 33 66 50 C66 50 70 43 68 35 C68 35 78 45 73 60 C73 60 68 70 60 75 C56 78 46 75 46 75Z" fill="url(#fg)"/>
                <path d="M50 70 C50 70 38 63 40 50 C40 50 45 55 47 53 C47 53 45 45 53 40 C53 40 50 50 58 53 C58 53 63 48 60 43 C60 43 68 50 63 63 C63 63 58 70 50 70Z" fill="#111111" opacity="0.55"/>
                <!-- Hub icon -->
                <circle cx="82" cy="42" r="6" fill="#f97316"/>
                <circle cx="82" cy="68" r="6" fill="#f97316"/>
                <circle cx="67" cy="55" r="9" fill="none" stroke="#f97316" stroke-width="5"/>
                <line x1="74" y1="51" x2="78" y2="46" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
                <line x1="74" y1="59" x2="78" y2="64" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
                <circle cx="95" cy="55" r="6" fill="#f97316"/>
                <line x1="76" y1="55" x2="89" y2="55" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>

        <!-- Badge -->
        <div class="badge">
            <span class="badge-dot"></span>
            En construcción
        </div>

        <!-- Heading -->
        <h1>Acquirer API Hub</h1>

        <p>
            Estamos construyendo la consola unificada para las APIs de adquirencia.<br>
            Gestión de Comercios, Perfiles y Terminales en un solo lugar.
        </p>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-label">
                <span>Progreso</span>
                <span>65%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <!-- Features -->
        <div class="features">
            <div class="feature">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                Comercios
            </div>
            <div class="feature">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Perfiles
            </div>
            <div class="feature">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Terminales
            </div>
            <div class="feature">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Firma HMAC
            </div>
            <div class="feature">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                Consola de pruebas
            </div>
        </div>

        <footer>
            &copy; 2026 Acquirer API Hub &mdash; Redsys
        </footer>

    </div>
</body>
</html>
